<!DOCTYPE html>
<html>
<head>
    <title>Ochogo Market</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }
        header {
            background: #0a1f44;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }
        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Ochogo Market</h1>
    <p>Buy & Sell Easily in Mwanza</p>
</header>

<div class="container">

    <div class="product">
        <h3>Wireless Earbuds</h3>
        <p>Price: 18,000 TZS</p>
        <button onclick="order()">Order via WhatsApp</button>
    </div>

    <div class="product">
        <h3>Power Bank</h3>
        <p>Price: 25,000 TZS</p>
        <button onclick="order()">Order via WhatsApp</button>
    </div>

</div>

<script>
function order() {
    window.location.href = "https://wa.me/255786701040";
}
</script>

</body>
</html>
